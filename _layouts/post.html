---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    {% if page.tags and page.tags.size > 0 %}· {{ page.tags | join: ", " }}{% endif %}
  </p>
  <div class="prose">
    {{ content }}
  </div>
</article>
